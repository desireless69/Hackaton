<!DOCTYPE html>
<html lang="en" data-theme="light" data-ui-preset="mission-control" data-density="comfortable">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UAV Telemetry Analyzer{% endblock %}</title>
    <script>
        (function () {
            const storedTheme = localStorage.getItem("telemetry-theme");
            const storedPreset = localStorage.getItem("telemetry-ui-preset");
            const storedDensity = localStorage.getItem("telemetry-density");

            if (storedTheme) {
                document.documentElement.setAttribute("data-theme", storedTheme);
            }

            if (storedPreset) {
                document.documentElement.setAttribute("data-ui-preset", storedPreset);
            }

            if (storedDensity) {
                document.documentElement.setAttribute("data-density", storedDensity);
            }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='/favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body data-page="{% block body_page %}default{% endblock %}">
    {% block body %}{% endblock %}
    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
